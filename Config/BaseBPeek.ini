; =============================================================================
; BPeek plugin — settings documentation & override template.
;
; Ships with the plugin so end users discover every setting without
; reading C++ source. All entries are commented out by default — the
; ACTIVE defaults come from the C++ constructor (Source/BPeek/
; BPeekSettings.cpp) and per-UPROPERTY initialisers.
;
; Shipping real values here would silently override the code defaults
; (we hit that bug during rollout — filter went from /Game/** to empty
; and scans suddenly included /Engine). Keep this file as docs only;
; put project overrides in <Project>/Config/DefaultBPeek.ini.
;
; Config layering (later layers override earlier):
;
;   Engine/Config/BaseBPeek.ini         (rare)
;   <Plugin>/Config/BaseBPeek.ini       ← THIS FILE (docs only)
;   <Project>/Config/DefaultBPeek.ini   ← project settings
;                                         (Project Settings > Plugins > BPeek
;                                          writes here)
;   <Project>/Saved/Config/…BPeek.ini   ← per-user runtime overrides
;
; CLI flags override everything.
;
; Array-of-strings syntax for multi-value settings (IncludePatterns,
; ExcludePatterns): UE ini's `+` prefix appends one element per line.
; `!Key=ClearArray` resets the array before adding.
; =============================================================================

[/Script/BPeek.BPeekSettings]

; -----------------------------------------------------------------------------
; Output
; -----------------------------------------------------------------------------

; Where MD output lands. Empty = <Project>/Saved/BPeek/.
; Supports ${ProjectDir} and ${SavedDir} tokens.
;OutputDirectory=(Path="${ProjectDir}/bpeek")


; -----------------------------------------------------------------------------
; Filtering — glob patterns matched against UE mount paths.
; -----------------------------------------------------------------------------

; Default IncludePatterns (from BPeekSettings.cpp constructor):
;   /Game/**
;   /Module_*/**
;
; To REPLACE the plugin default in your project's DefaultBPeek.ini:
;   !IncludePatterns=ClearArray
;   +IncludePatterns=/Game/**
;   +IncludePatterns=/ShooterCore/**
;
; To EXTEND the default (merge with CDO):
;   +IncludePatterns=/ShooterCore/**

; Default ExcludePatterns (from BPeekSettings.cpp constructor):
;   /Game/Megascans/**
;   /Game/Quixel/**
;
; Same `+` / `!Key=ClearArray` syntax applies.

; Optional path to a plaintext file with additional include patterns —
; merged with IncludePatterns at runtime. One glob per line, `#` for
; comments. Currently causes the filter to RESET then load the file
; (behaviour slated for a future cleanup; until then don't mix inline
; + external include lists).
;ExternalIncludeFile=(FilePath="W:/My/BPeek/Examples/whitelist-kazzinc.txt")

; Same semantics for excludes.
;ExternalExcludeFile=(FilePath="")


; -----------------------------------------------------------------------------
; Rendering
; -----------------------------------------------------------------------------

; Emit the ## Logic section (pseudo-bytecode walker output) in per-BP MDs.
; Default: True.
;bEmitLogicSection=True

; Emit the ## Issues section (asset validator + code warnings).
; Default: True.
;bEmitIssuesSection=True

; Verbose mode = human-friendly expanded layout (markdown tables, single-file
; Blueprint MDs, un-shortened asset paths). Default: False (compact
; AI-optimised layout). CLI flag -verbose overrides this.
;bVerboseMode=True
